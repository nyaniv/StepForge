# RunPod configuration — paths read from environment variables.
# Tuned for a single NVIDIA A100 SXM 80 GB pod.
# Set VOLUME in your .env file (see .env.example).
#
# VOLUME = RunPod Network Volume mount point (e.g. /runpod-volume)
#          Large data and checkpoints live here — persists across pod restarts.
#
# A100 SXM 80 GB differences vs. Scholar config:
#   - bf16 training (native A100 tensor cores; more stable than fp16)
#   - SFT per_device_train_batch_size=2, gradient_accumulation_steps=8 (effective batch=16)
#   - RL  per_device_train_batch_size=1, gradient_accumulation_steps=8 (effective batch=8)

paths:
  # Raw data (on Network Volume — downloaded once by runpod_setup.sh)
  cad_seq_dir:           ${oc.env:VOLUME}/data/cad_seq
  caption_csv:           ${oc.env:VOLUME}/data/text2cad_v1.1.csv
  split_json:            ${oc.env:VOLUME}/data/train_test_val.json
  text2cad_src:          ${oc.env:VOLUME}/data/Text2CAD/CadSeqProc

  # Generated by pipeline (on Network Volume — persists across restarts)
  step_output_dir:       ${oc.env:VOLUME}/processed/step_files
  processed_dir:         ${oc.env:VOLUME}/processed
  faiss_index_path:      ${oc.env:VOLUME}/retrieval/caption_index.faiss
  faiss_metadata_path:   ${oc.env:VOLUME}/retrieval/metadata.pkl
  sft_checkpoint_dir:    ${oc.env:VOLUME}/checkpoints/sft
  rl_checkpoint_dir:     ${oc.env:VOLUME}/checkpoints/rl

data:
  max_entities: 500        # filter threshold — paper excludes >=500 entity files
  caption_column: "abstract"  # use L0 abstract captions

model:
  base_model: "meta-llama/Llama-3.2-3B-Instruct"  # paper Table 3: selected over Qwen-2.5-3B
  max_seq_length: 8192       # NOT stated in paper; 8192 fits prompt+output on A100 80GB
  lora_r: 16                 # NOT stated in paper; from implementation plan
  lora_alpha: 32             # NOT stated in paper; from implementation plan
  lora_dropout: 0.0          # must be 0.0 — Unsloth kernel fusions break with non-zero dropout

sft:
  # Paper Section 4.1 values (single A100 80GB smoke-test deviations noted inline):
  per_device_train_batch_size: 2    # paper: effective batch=16; 2×8=16
  gradient_accumulation_steps: 8
  learning_rate: 2.0e-4             # paper: "learning rate of 2e-4"
  num_epochs: 1                     # DEVIATION: smoke test; paper trains for 10 epochs
  warmup_ratio: 0.05                # paper: "warm-up of 5% of the total training steps"
  optim: "adamw_8bit"               # paper: "AdamW (8-bit) optimizer"

rl:
  # Paper Section 4.4 values — single-GPU deviations noted inline:
  num_generations: 4                # DEVIATION: paper uses 8; reduced to 4 on single A100 to avoid OOM
  kl_coef: 0.02                     # paper: "KL penalty coefficient of 0.02"
  entropy_coef: 0.005               # paper: "entropy coefficient of 0.005"
  learning_rate: 3.0e-6             # paper: "learning rate of 3e-6"
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 8    # single GPU: 1×8 accum = 8 total prompts (matches paper's effective batch of 8)
  max_steps: 40                     # DEVIATION: paper uses 80; reduced for budget smoke-test
  max_completion_length: 4096       # NOT stated in paper; must match build_rl_dataset filter
  reward:
    delta_low: 0.01                 # paper Section 4.4: "lower bound to 0.01"
    delta_high: 0.5                 # paper Section 4.4: "upper bound to 0.5"
    n_sample_points: 2048           # NOT stated in paper; from implementation plan

retrieval:
  model: "all-MiniLM-L6-v2"  # paper Section 3.2: "SentenceTransformer to embed captions"
  top_k: 1                    # paper Section 3.2: retrieves single most similar example

paths:
  # Text2CAD dataset paths
  cad_seq_dir:  "/Users/nadavyaniv/step llm plan/cad_seq"          # unzip cad_seq.zip here first: unzip "cad_seq.zip" -d .
  caption_csv:  "/Users/nadavyaniv/step llm plan/text2cad_v1.1.csv"
  split_json:   "/Users/nadavyaniv/step llm plan/train_test_val.json"
  text2cad_src: "/Users/nadavyaniv/step llm plan/Text2CAD/CadSeqProc"

  # StepLLM output paths (will be created automatically)
  step_output_dir:    "/Users/nadavyaniv/step llm plan/StepLLM/data/step_files"
  processed_dir:      "/Users/nadavyaniv/step llm plan/StepLLM/data/processed"
  faiss_index_path:   "/Users/nadavyaniv/step llm plan/StepLLM/retrieval/caption_index.faiss"
  faiss_metadata_path: "/Users/nadavyaniv/step llm plan/StepLLM/retrieval/metadata.pkl"
  sft_checkpoint_dir: "/Users/nadavyaniv/step llm plan/StepLLM/checkpoints/sft"
  rl_checkpoint_dir:  "/Users/nadavyaniv/step llm plan/StepLLM/checkpoints/rl"

data:
  max_entities: 500        # filter threshold — paper excludes >=500 entity files
  caption_column: "abstract"  # use L0 abstract captions

model:
  base_model: "meta-llama/Llama-3.2-3B-Instruct"  # paper Table 3: selected over Qwen-2.5-3B
  max_seq_length: 8192       # NOT stated in paper; chosen to fit prompt + output on local GPU
  lora_r: 16                 # NOT stated in paper; from implementation plan
  lora_alpha: 32             # NOT stated in paper; from implementation plan
  lora_dropout: 0.0          # must be 0.0 — Unsloth kernel fusions break with non-zero dropout

sft:
  # Paper Section 4.1 values:
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 8    # effective batch = 2×8 = 16 (paper: "effective batch size of 16")
  learning_rate: 2.0e-4             # paper: "learning rate of 2e-4"
  num_epochs: 10                    # paper: "trained for 10 epochs"
  warmup_ratio: 0.05                # paper: "warm-up of 5% of the total training steps"
  optim: "adamw_8bit"               # paper: "AdamW (8-bit) optimizer"

rl:
  # Paper Section 4.4 values — single GPU deviations noted inline:
  num_generations: 8                # paper: "8 sampled responses per prompt" (use 4 on single GPU to avoid OOM)
  kl_coef: 0.02                     # paper: "KL penalty coefficient of 0.02"
  entropy_coef: 0.005               # paper: "entropy coefficient of 0.005"
  learning_rate: 3.0e-6             # paper: "learning rate of 3e-6"
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 8    # single GPU: 1×8 accum = 8 total prompts (paper: 4 GPUs × 2/GPU = 8)
  max_steps: 80                     # paper: "total of 80 optimization steps"
  max_completion_length: 4096       # NOT stated in paper; must match build_rl_dataset filter
  reward:
    delta_low: 0.01                 # paper Section 4.4: "lower bound to 0.01"
    delta_high: 0.5                 # paper Section 4.4: "upper bound to 0.5"
    n_sample_points: 2048           # NOT stated in paper; from implementation plan

retrieval:
  model: "all-MiniLM-L6-v2"  # paper Section 3.2: "SentenceTransformer to embed captions"
  top_k: 1                    # paper Section 3.2: retrieves single most similar example

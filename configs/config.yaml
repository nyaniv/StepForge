paths:
  # Text2CAD dataset paths
  cad_seq_dir:  "/Users/nadavyaniv/step llm plan/cad_seq"          # unzip cad_seq.zip here first: unzip "cad_seq.zip" -d .
  caption_csv:  "/Users/nadavyaniv/step llm plan/text2cad_v1.1.csv"
  split_json:   "/Users/nadavyaniv/step llm plan/train_test_val.json"
  text2cad_src: "/Users/nadavyaniv/step llm plan/Text2CAD/CadSeqProc"

  # StepLLM output paths (will be created automatically)
  step_output_dir:    "/Users/nadavyaniv/step llm plan/StepLLM/data/step_files"
  processed_dir:      "/Users/nadavyaniv/step llm plan/StepLLM/data/processed"
  faiss_index_path:   "/Users/nadavyaniv/step llm plan/StepLLM/retrieval/caption_index.faiss"
  faiss_metadata_path: "/Users/nadavyaniv/step llm plan/StepLLM/retrieval/metadata.pkl"
  sft_checkpoint_dir: "/Users/nadavyaniv/step llm plan/StepLLM/checkpoints/sft"
  rl_checkpoint_dir:  "/Users/nadavyaniv/step llm plan/StepLLM/checkpoints/rl"

data:
  max_entities: 500        # filter threshold — paper excludes >=500 entity files
  caption_column: "abstract"  # use L0 abstract captions

model:
  base_model: "meta-llama/Llama-3.2-3B-Instruct"  # best per paper Table 3
  max_seq_length: 8192
  lora_r: 16
  lora_alpha: 32
  lora_dropout: 0.0   # must be 0 — Unsloth kernel fusions break with non-zero dropout

sft:
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 8    # effective batch = 16 (paper)
  learning_rate: 2.0e-4             # paper
  num_epochs: 10                    # paper
  warmup_ratio: 0.05                # paper
  optim: "adamw_8bit"               # paper

rl:
  num_generations: 8                # paper (reduce to 4 on single GPU)
  kl_coef: 0.02                     # paper
  entropy_coef: 0.005               # paper
  learning_rate: 3.0e-6             # paper
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 8
  max_steps: 80                     # paper (increase to 160 on single GPU)
  reward:
    delta_low: 0.01                 # paper
    delta_high: 0.5                 # paper
    n_sample_points: 2048

retrieval:
  model: "all-MiniLM-L6-v2"
  top_k: 1                          # paper retrieves top-1

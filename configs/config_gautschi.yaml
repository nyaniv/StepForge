# Gautschi HPC Cluster (Purdue RCAC) — Gautschi-H nodes
# Hardware: 8× NVIDIA H100 80GB, 112 CPUs, 1 TB RAM
# Scratch:  $SCRATCH  (200 TB quota, see myquota)
#
# Full paper hyperparameters — no compromises needed at this scale.
# Paper (Chen et al., 2026) used 4×H100; we use 8×H100 with matching throughput.
#
# FIRST-TIME SETUP:
#   bash gautschi_setup.sh
#
# SUBMIT JOBS:
#   sbatch slurm_sft_gautschi.sh      # SFT:  1× H100, ~24 h (Unsloth, single-GPU)
#   sbatch slurm_rl_gautschi.sh       # RL:   8× H100, ~12 h (torchrun DDP)
#
# PATHS: all large files go to $SCRATCH to stay within home quota.
# OmegaConf resolves ${oc.env:SCRATCH} from the shell environment at load time.

paths:
  # Raw dataset (download once via gautschi_setup.sh or manually)
  cad_seq_dir:           ${oc.env:SCRATCH}/data/cad_seq
  caption_csv:           ${oc.env:SCRATCH}/data/text2cad_v1.1.csv
  split_json:            ${oc.env:SCRATCH}/data/train_test_val.json
  text2cad_src:          ${oc.env:SCRATCH}/data/Text2CAD/CadSeqProc

  # Pipeline outputs (generated by data pipeline, persists on scratch)
  step_output_dir:       ${oc.env:SCRATCH}/stepforge/processed/step_files
  processed_dir:         ${oc.env:SCRATCH}/stepforge/processed
  faiss_index_path:      ${oc.env:SCRATCH}/stepforge/retrieval/caption_index.faiss
  faiss_metadata_path:   ${oc.env:SCRATCH}/stepforge/retrieval/metadata.pkl
  sft_checkpoint_dir:    ${oc.env:SCRATCH}/stepforge/checkpoints/sft
  rl_checkpoint_dir:     ${oc.env:SCRATCH}/stepforge/checkpoints/rl

data:
  max_entities: 500          # paper: exclude files with >=500 entities
  caption_column: "abstract" # L0 single-sentence captions (paper)

model:
  base_model: "meta-llama/Llama-3.2-3B-Instruct"  # best per paper Table 3
  max_seq_length: 16384      # H100 80GB + FlashAttention-2 can handle 16K; gives full RAG context
  lora_r: 16                 # paper
  lora_alpha: 32             # paper
  lora_dropout: 0.0          # must be 0.0 — Unsloth kernel fusions break with non-zero dropout
  use_quantization: false    # 3B in bf16 = ~6 GB — H100 80GB has ample headroom; no 4-bit needed
  max_retrieved_tokens: 4096 # paper does NOT truncate; 4096 covers a full median STEP file

sft:
  # Single H100 80GB with Unsloth (Unsloth does not support multi-GPU)
  # Effective batch = per_device × grad_accum = 2 × 8 = 16  (paper value)
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 8
  learning_rate: 2.0e-4      # paper
  num_epochs: 10             # paper
  warmup_ratio: 0.05         # paper
  optim: "adamw_8bit"        # paper

rl:
  # 8× H100 via torchrun DDP.  Throughput matches paper's 4×H100 setup:
  #   paper:    4 GPUs × 2 prompts/GPU × 8 gen/prompt = 64 sequences/step
  #   gautschi: 8 GPUs × 1 prompt/GPU  × 8 gen/prompt = 64 sequences/step
  num_generations: 8               # paper value
  kl_coef: 0.02                    # paper
  entropy_coef: 0.005              # paper
  learning_rate: 3.0e-6            # paper
  per_device_train_batch_size: 1   # 1 prompt × 8 GPUs = 8 prompts/step; ×8 gen = 64 sequences
  gradient_accumulation_steps: 1   # 8 GPUs already gives sufficient effective batch
  max_steps: 80                    # paper value (same as paper — 4×H100 reference run)
  reward:
    delta_low: 0.01                # paper
    delta_high: 0.5                # paper
    n_sample_points: 2048          # paper

retrieval:
  model: "all-MiniLM-L6-v2"       # paper
  top_k: 1                         # paper retrieves top-1

# Gautschi HPC Cluster (Purdue RCAC) — Gautschi-H nodes
# Hardware: 8× NVIDIA H100 80GB, 112 CPUs, 1 TB RAM
# Scratch:  $SCRATCH  (200 TB quota, see myquota)
#
# Full paper hyperparameters — no compromises needed at this scale.
# Paper (Shi et al., 2026) used 4×H100; we use 8×H100 with matching throughput.
#
# FIRST-TIME SETUP:
#   bash gautschi_setup.sh
#
# SUBMIT JOBS:
#   sbatch slurm_sft_gautschi.sh      # SFT:  1× H100, ~24 h (Unsloth, single-GPU)
#   sbatch slurm_rl_gautschi.sh       # RL:   8× H100, ~12 h (torchrun DDP)
#
# PATHS: all large files go to $SCRATCH to stay within home quota.
# OmegaConf resolves ${oc.env:SCRATCH} from the shell environment at load time.

paths:
  # Raw dataset (download once via gautschi_setup.sh or manually)
  cad_seq_dir:           ${oc.env:SCRATCH}/data/cad_seq
  caption_csv:           ${oc.env:SCRATCH}/data/text2cad_v1.1.csv
  split_json:            ${oc.env:SCRATCH}/data/train_test_val.json
  text2cad_src:          ${oc.env:SCRATCH}/data/Text2CAD/CadSeqProc

  # Pipeline outputs (generated by data pipeline, persists on scratch)
  step_output_dir:       ${oc.env:SCRATCH}/stepforge/processed/step_files
  processed_dir:         ${oc.env:SCRATCH}/stepforge/processed
  faiss_index_path:      ${oc.env:SCRATCH}/stepforge/retrieval/caption_index.faiss
  faiss_metadata_path:   ${oc.env:SCRATCH}/stepforge/retrieval/metadata.pkl
  sft_checkpoint_dir:    ${oc.env:SCRATCH}/stepforge/checkpoints/sft
  rl_checkpoint_dir:     ${oc.env:SCRATCH}/stepforge/checkpoints/rl

data:
  max_entities: 500          # paper: exclude files with >=500 entities
  caption_column: "abstract" # L0 single-sentence captions (paper)

model:
  base_model: "meta-llama/Llama-3.2-3B-Instruct"  # paper Table 3: selected over Qwen-2.5-3B (lower MSCD)
  # max_seq_length is NOT stated in the paper.  We use 16384 so the full retrieved
  # STEP file fits without truncation — the paper does not truncate retrieved context.
  # H100 80GB + FlashAttention-2 handles 16K without OOM.
  max_seq_length: 16384
  # LoRA r/alpha are NOT stated in the paper; these come from the implementation plan.
  lora_r: 16
  lora_alpha: 32
  lora_dropout: 0.0          # must be 0.0 — Unsloth kernel fusions break with non-zero dropout
  use_quantization: false    # 3B in bf16 = ~6 GB; H100 80GB has ample headroom, no quantization needed
  # max_retrieved_tokens is NOT stated in the paper (paper does not truncate).
  # CL-4: 16K context can hold prompt + ~10K retrieved + ~5K target without
  # truncating either side; the previous 4096 was tighter than the 8K configs.
  max_retrieved_tokens: 10000

sft:
  # All values below are FROM THE PAPER (Section 4.1).
  # Single H100 80GB with Unsloth (Unsloth is single-GPU only).
  # Effective batch = per_device × grad_accum = 2 × 8 = 16  (paper: "effective batch size of 16")
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 8
  learning_rate: 2.0e-4      # paper Section 4.1: "learning rate of 2e-4"
  num_epochs: 10             # paper Section 4.1: "trained for 10 epochs"
  warmup_ratio: 0.05         # paper Section 4.1: "warm-up of 5% of the total training steps"
  optim: "adamw_8bit"        # paper Section 4.1: "AdamW (8-bit) optimizer"

rl:
  # All values below are FROM THE PAPER (Section 4.4) unless marked otherwise.
  #
  # Paper ran 4×H100 × 2 prompts/GPU × 8 gen/prompt = 64 sequences/step
  # Gautschi: 8×H100 × 1 prompt/GPU  × 8 gen/prompt = 64 sequences/step  ← same throughput
  num_generations: 8               # paper Section 4.4: "8 sampled responses per prompt"
  kl_coef: 0.02                    # paper Section 4.4: "KL penalty coefficient of 0.02"
  entropy_coef: 0.005              # paper Section 4.4: "entropy coefficient of 0.005"
  learning_rate: 3.0e-6            # paper Section 4.4: "learning rate of 3e-6"
  per_device_train_batch_size: 1   # derived: paper batch=8 total, 8 GPUs → 1 per GPU
  gradient_accumulation_steps: 1   # derived: 8 GPUs × 1 per_device × 1 accum = 8 total prompts
  max_steps: 80                    # paper Section 4.4: "total of 80 optimization steps"
  # max_completion_length is NOT stated in the paper.  8192 is our engineering choice
  # for H100 with FlashAttention-2; increases trainable examples vs the 4096 used on A100.
  max_completion_length: 8192
  use_reward_shaping: false        # NOT in paper. true adds format/parse shaping (see rl_train.py)
  save_steps: 10                   # CR-4: checkpoint cadence (was hardcoded 20)
  kl_halt_threshold: 1.0           # OB-1: auto-stop if KL exceeds (policy collapse). With kl_coef=0.02 and 80 steps, KL should stay <0.5.
  reward:
    delta_low: 0.01                # paper Section 4.4: "lower bound to 0.01"
    delta_high: 0.5                # paper Section 4.4: "upper bound to 0.5"
    n_sample_points: 2000           # A4: official eval uses 2000 (step_chamfer_reward.py:40)
    # A1: true = paper Eq.(1) bidirectional; false = official eval code (chamferdist forward-only)
    chamfer_bidirectional: true
    # A2: W16 scale prenorm; set false for paper-exact 3-stage alignment
    scale_prenorm: true
    # A3: null=adaptive (C11 OOM-safe); 0.1=official eval
    mesh_deflection: null

retrieval:
  model: "all-MiniLM-L6-v2"  # paper Section 3.2: "SentenceTransformer to embed captions"
  top_k: 1                    # paper Section 3.2: retrieves single most similar example
